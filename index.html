<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bisb Revision</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="confettiCanvas" class="confetti-canvas" aria-hidden="true"></canvas>
  <div id="passwordGate" class="gate-overlay">
    <div class="gate-card">
      <p class="eyebrow">Bisb Revision</p>
      <h1>Enter password</h1>
      <p class="gate-copy">Open your revision space.</p>
      <form id="passwordForm" class="gate-form">
        <label for="passwordInput">Password</label>
        <input id="passwordInput" type="password" autocomplete="current-password" placeholder="Password">
        <button type="submit">Unlock</button>
      </form>
      <p id="passwordError" class="error-message" aria-live="polite"></p>
    </div>
  </div>

  <div class="app-shell">
    <aside class="vault-panel">
      <p class="eyebrow">Revision</p>
      <h1>Bisb Revision</h1>
      <p class="vault-copy">Pick a set. Nothing else shows until you do.</p>
      <div id="setList" class="set-list"></div>
    </aside>

    <main class="study-stage">
      <section id="studyIntro" class="intro-panel">
        <p class="eyebrow">Ready</p>
        <h2>Select something to revise</h2>
      </section>

      <section id="studyShell" class="study-shell hidden">
        <div class="study-head">
          <div>
            <p class="eyebrow">Now revising</p>
            <h2 id="studyTitle"></h2>
          </div>
          <div class="stats-row">
            <div class="stat-pill">
              <span id="setCount">0</span>
              <small>Sets</small>
            </div>
            <div class="stat-pill">
              <span id="cardCount">0</span>
              <small>Cards</small>
            </div>
            <div class="stat-pill">
              <span id="sessionCount">0</span>
              <small>Sessions</small>
            </div>
          </div>
        </div>

        <div class="study-meta">
          <span id="studyStep" class="badge">Review</span>
          <span id="studyProgress" class="badge muted">0 / 0</span>
        </div>

        <div id="studyContent" class="study-content"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
